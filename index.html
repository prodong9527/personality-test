    </div>
    
    <div id="quizContainer">

        <button class="nav-btn next-btn" id="nextBtn" onclick="nextQuestion()">下一题 →</button>

    </div>
    
    <div id="result" class="result">

    <div class="footer">

      {
        q: "卡片上说：'你可以保留这份力量，或者把它归还。'你会？",
        options: ["保留，这太珍贵了", "归还，这不是我该拥有的", "再想想，不急着决定", "问问狐狸的意见"]
      },
      {
        q: "如果你选择保留，卡片说：'力量会改变你。'你会？",
        options: ["接受改变，看看会变成什么样", "有点害怕，但还是保留", "问会怎么改变", "改变主意，选择归还"]
      },
      {
        q: "如果你选择归还，卡片说：'但记忆会留下。'你会？",
        options: ["接受，经历本身就是财富", "后悔了，想收回决定", "想想这段经历教会了你什么", "把故事写下来"]
      },
      {
        q: "最终，你做出了选择。狐狸的声音再次响起：'你找到了属于自己的路。'你会？",
        options: ["感谢这段经历", "想想接下来要做什么", "觉得松了一口气", "期待下一次冒险"]
      },
      {
        q: "回到现实后，你发现自己的一些习惯改变了。你会？",
        options: ["接受这些改变，顺其自然", "试图恢复到以前的状态", "观察这些改变带来的影响", "告诉信任的朋友"]
      },
      {
        q: "某天，你在街上看到一个熟悉的狐狸图案。你会？",
        options: ["追过去看看", "觉得是幻觉，继续走", "拍照留念", "想想是不是又要有冒险了"]
      },
      {
        q: "你开始记录生活中的'小奇迹'——恰好遇到的好事。你会？",
        options: ["认真记录每一件", "觉得是心理作用", "只记录特别的事", "分享给朋友"]
      },
      {
        q: "朋友说'你最近好像不一样了'，你会？",
        options: ["笑着说可能是吧", "认真想想自己哪里变了", "说没什么变化", "问问朋友觉得哪里不一样"]
      },
      {
        q: "某天晚上，你梦到了那片森林。醒来后，你会？",
        options: ["想想梦里的细节", "觉得是日有所思夜有所梦", "记录下来，看看有没有意义", "不想太多，继续生活"]
      },
      {
        q: "【终章】故事的最后，你明白了什么？",
        options: ["冒险不在远方，在日常的每个选择里", "力量不是拥有，而是如何使用", "改变不是目的，成长才是", "所有的相遇都是命中注定"]
      }
    ];
    
    let currentMode = 'standard';
    let currentQuestion = 0;
    let answers = {};
    let questionData = [];
    
    function selectMode(mode) {
      currentMode = mode;
      document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
      event.target.closest('.mode-btn').classList.add('active');
      
      questionData = mode === 'standard' ? standardQuestions : storyQuestions;
      currentQuestion = 0;
      answers = {};
      
      document.getElementById('quizContainer').style.display = 'block';
      document.getElementById('result').style.display = 'none';
      
      showQuestion();
    }
    
    function showQuestion() {
      const question = questionData[currentQuestion];
      const container = document.getElementById('questionContainer');
      
      container.innerHTML = `
        <div class="question">
          <h3><span class="question-number">Q${currentQuestion + 1}</span>${question.q}</h3>
          <div class="options">
            ${question.options.map((opt, idx) => `
              <label class="option ${answers[currentQuestion] === idx ? 'selected' : ''}">
                <input type="radio" name="option" value="${idx}" ${answers[currentQuestion] === idx ? 'checked' : ''} onchange="selectOption(${idx})">
                ${String.fromCharCode(65 + idx)}. ${opt}
              </label>
            `).join('')}
          </div>
        </div>
      `;
      
      updateProgress();
      updateButtons();
    }
    
    function selectOption(optionIdx) {
      answers[currentQuestion] = optionIdx;
      showQuestion();
    }
    
    function updateProgress() {
      const progress = ((currentQuestion + 1) / questionData.length) * 100;
      document.getElementById('progressText').textContent = `${currentQuestion + 1}/${questionData.length}`;
      document.getElementById('progressPercent').textContent = Math.round(progress) + '%';
      document.getElementById('progressFill').style.width = progress + '%';
    }
    
    function updateButtons() {
      document.getElementById('prevBtn').style.display = currentQuestion > 0 ? 'block' : 'none';
      
      const nextBtn = document.getElementById('nextBtn');
      if (currentQuestion === questionData.length - 1) {
        nextBtn.textContent = '🎮 查看结果';
      } else {
        nextBtn.textContent = '下一题 →';
      }
    }
    
    function prevQuestion() {
      if (currentQuestion > 0) {
        currentQuestion--;
        showQuestion();
      }
    }
    
    function nextQuestion() {
      if (answers[currentQuestion] === undefined) {
        alert('请先选择一个选项哦～');
        return;
      }
      
      if (currentQuestion < questionData.length - 1) {
        currentQuestion++;
        showQuestion();
      } else {
        calculateResult();
      }
    }
    
    function calculateResult() {
      // 复杂的计分算法，不让用户猜出规律
      let scores = { a: 0, b: 0, c: 0, d: 0 };
      
      // 不同题目类型权重不同
      const weights = [1, 2, 1, 3, 2, 1, 3, 2, 1, 2, 3, 1, 2, 3, 1, 2, 1, 3, 2, 1, 3, 2, 1, 2, 3, 1, 2, 1, 3, 2];
      
      for (let q in answers) {
        const option = answers[q];
        const weight = weights[q % weights.length];
        scores[String.fromCharCode(65 + option)] += weight;
      }
      
      // 找出最高分
      let maxScore = 0;
      let resultType = 'a';
      for (let [key, score] of Object.entries(scores)) {
        if (score > maxScore) {
          maxScore = score;
          resultType = key;
        }
      }
      
      const results = {
        a: {
          title: '⏰ 拖延系外挂',
          desc: '你的作弊码是"最后期限爆发力"。平时看着懒散，一到 deadline 直接开挂，效率吊打别人。人生信条：能拖到明天，绝不做在今天。',
          motto: '🎯 人生信条：能拖到明天，绝不做在今天',
          warning: '⚠️ 风险：心脏承受能力越来越强'
        },
        b: {
          title: '🧠 好奇系外挂',
          desc: '你的作弊码是"信息吸收力"。对什么都感兴趣，学东西快，人脉广，因为你知道的杂学最多。人生信条：知道得越多，活得越明白。',
          motto: '🎯 人生信条：知道得越多，活得越明白',
          warning: '⚠️ 风险：容易分心，专注力是短板'
        },
        c: {
          title: '🎯 直觉系外挂',
          desc: '你的作弊码是"精准判断力"。不纠结、不内耗，直觉准到离谱。别人分析半小时，你 3 秒给答案，还他妈挺准。人生信条：想多了累，做了再说。',
          motto: '🎯 人生信条：想多了累，做了再说',
          warning: '⚠️ 风险：偶尔会错过深度思考的机会'
        },
        d: {
          title: '🚀 行动系外挂',
          desc: '你的作弊码是"执行力碾压"。想到就做，不给自己反悔的机会。别人还在规划，你已经干完了。人生信条：完成比完美重要。',
          motto: '🎯 人生信条：完成比完美重要',
          warning: '⚠️ 风险：容易冲动，需要学会慢一点'
        }
      };
      
      const result = results[resultType];
      
      document.getElementById('resultTitle').textContent = result.title;
      document.getElementById('resultDesc').textContent = result.desc;
      document.getElementById('resultMotto').textContent = result.motto;
      document.getElementById('resultWarning').textContent = result.warning;
      
      document.getElementById('quizContainer').style.display = 'none';
      document.getElementById('result').style.display = 'block';
    }
    
    function shareResult() {
      const title = document.getElementById('resultTitle').textContent;
      const text = `我刚测了我的"人生作弊码"，结果是：${title}！你也来测测看👉 ` + window.location.href;
      
      if (navigator.share) {
        navigator.share({
          title: '测测你的"人生作弊码"',
          text: text,
          url: window.location.href
        });
      } else {
        navigator.clipboard.writeText(text).then(() => {
          alert('分享链接已复制到剪贴板！');
        });
      }
    }
    
    // 初始化
    selectMode('standard');
  </script>
</body>
</html>
